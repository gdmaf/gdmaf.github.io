<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent:      '#1D4ED8',
            'accent-hv': '#1e40af',
            'accent-lt': '#EFF6FF',
            surface:     '#F8FAFC',
            border:      '#E2E8F0',
            muted:       '#64748B',
            ink:         '#020617',
          },
          fontFamily: {
            serif: ['"EB Garamond"', 'Georgia', 'serif'],
            sans:  ['Inter', 'system-ui', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    html { scroll-behavior: smooth; }
    .nav-link { position: relative; transition: color 0.2s; }
    .nav-link::after {
      content: ''; position: absolute; bottom: -3px; left: 0;
      width: 0; height: 1.5px; background: #1D4ED8;
      transition: width 0.22s ease;
    }
    .nav-link:hover::after { width: 100%; }
    .nav-link:hover { color: #1D4ED8; }
    .section-tag {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase; color: #1D4ED8;
    }
    .section-tag::before { content: ''; display: block; width: 24px; height: 1.5px; background: #1D4ED8; }
    a:focus-visible, button:focus-visible { outline: 2px solid #1D4ED8; outline-offset: 2px; }
    a, button { cursor: pointer; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body class="bg-white text-ink font-sans antialiased">

  <header class="sticky top-0 z-50 bg-white/95 backdrop-blur-sm border-b border-border">

        <img src="../images/logo-unifei.png" alt="UNIFEI" class="h-7 w-auto object-contain opacity-70 group-hover:opacity-100 transition-opacity hidden sm:block" />
      </a>
      <nav class="hidden md:flex items-center gap-7 text-[13px] font-medium text-muted" aria-label="Menu principal">

        <a href="../index.html#publicacoes" class="nav-link">Publicações</a>
        <a href="../index.html#equipe"      class="nav-link">Equipe</a>

          </div>

        </div>

              Currículo Lattes
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3"/>
              </svg>
